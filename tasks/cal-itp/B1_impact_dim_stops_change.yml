id: cal-itp_impact_01
repo: cal-itp
category: impact
difficulty: brutal
question: |
  If dim_stops is modified (e.g., a column is renamed), which models would
  be directly impacted? Consider only first-order downstream dependents.
tool_hint: check_impact
gold:
  required:
    - int_gtfs_schedule__stop_times_grouped
    - fct_daily_scheduled_stops
    - dim_stops_latest
  optional:
    - fct_monthly_stop_id_changes
    - idx_monthly_reports_site
    - fct_monthly_scheduled_stops
    - int_gtfs_quality__wheelchair_boarding_stops
    - int_gtfs_quality__persistent_ids_schedule
    - int_gtfs_quality__pathways_valid
    - int_gtfs_quality__include_tts
    - int_gtfs_quality__complete_wheelchair_accessibility_data
    - int_gtfs_quality__scheduled_trip_version_summary
  forbidden:
    - dim_schedule_feeds
    - stg_gtfs_schedule__stops
    - dim_routes
    - dim_trips
scoring:
  method: set_match
  partial_credit: true
notes: |
  Impact analysis should identify all direct downstream consumers of dim_stops.
  The key insight is that int_gtfs_schedule__stop_times_grouped references
  dim_stops for timezone data, creating a cross-layer dependency from mart
  back into intermediate. fct_daily_scheduled_stops is a second-hop consumer
  that also directly references dim_stops.
