id: mozilla-bigquery_impact_02
repo: mozilla-bigquery
category: impact
difficulty: brutal
question: |
  If `moz-fx-data-shared-prod.telemetry_derived.clients_first_seen_v1`
  is modified, what downstream tables are directly or transitively affected?
  Include both direct consumers and tables that consume those consumers.
tool_hint: check_impact
gold:
  required:
    - telemetry_derived.clients_last_seen_v1
    - firefox_desktop_derived.ltv_states_v1
  optional:
    - firefox_desktop_derived.client_ltv_v1
    - google_ads_derived.conversion_event_categorization_v2
  forbidden:
    - telemetry_derived.clients_first_seen_v1
    - telemetry_derived.clients_daily_v6
scoring:
  method: set_match
  partial_credit: true
notes: |
  clients_first_seen_v1 is directly referenced by:
  - clients_last_seen_v1 (reads its own previous output + clients_first_seen_v1)
  - ltv_states_v1 (JOINs with search_clients_last_seen_v2)
  - google_ads_derived.conversion_event_categorization_v2
  Transitively, client_ltv_v1 depends on ltv_states_v1. The self-reference
  in clients_first_seen_v1 is excluded since the question asks about downstream.
