id: sqlmesh-examples_reindex_01
repo: sqlmesh-examples
category: reindex
difficulty: medium
question: |
  After adding a new column 'event_date' to sushi.marketing (the SCD Type 2
  model), what should a reindex detect as changed?
tool_hint: reindex
gold:
  required:
    - marketing
  optional:
    - customers
  forbidden:
    - orders
    - items
    - order_items
    - raw_marketing
    - waiters
    - waiter_revenue_by_day
scoring:
  method: set_match
  partial_credit: true
notes: |
  The reindex must detect sushi.marketing as changed since its SQL was modified.
  sushi.customers references sushi.marketing (via the current_marketing_outer CTE)
  and may be flagged as potentially affected, but its source file is unchanged so
  it is optional. The reindex detects file-level changes, not transitive impact.
